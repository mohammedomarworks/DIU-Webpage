<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIU Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <img src="resource/WhatsApp Image 2026-07-06 at 02.33.46.jpeg" alt="DIU Logo" class="logo">

        <h1>Daffodil International University</h1>

        <h2>Student Information</h2>

        <table>

            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Age</th>
            </tr>

            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="number"></td>
            </tr>

        </table>

        <h2>Student Form</h2>

        <form>

            <div class="row">

                <label>Course</label>

                <select>

                    <option>Select Course</option>
                    <option>CSE</option>
                    <option>EEE</option>
                    <option>BBA</option>

                </select>

            </div>

            <div class="row">

                <label>Language</label>

                <select>

                    <option>Select Language</option>
                    <option>C</option>
                    <option>C++</option>
                    <option>Java</option>
                    <option>Python</option>

                </select>

            </div>

            <button>Submit</button>

        </form>

    </div>

</body>

</html>
